<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>College Event Registration Form</title>
    <style>
        body {
            font-family: Arial, sans-serif ;
            background-color: #f2f2f2;
            background-image: url('https://uploads.onecompiler.io/44bzcba6b/44bzbag5z/colorful-party-flags-gradient-background_9975-24601.avif');
        }
        .container {
            width: 400px;
            margin: 40px auto;
            background-color: #ffffff;
            padding: 20px;
            border-radius: 8px;
        }
        h2 {
            text-align: center;
        }
        label {
            font-weight: bold;
        }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin: 8px 0 15px 0;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="form-container">
      <center><img src= https://uploads.onecompiler.io/44bzcba6b/44bzbag5z/SIU%20Deemed%20Uni.logo.png style="width:300px;height: auto;"</center>
    </div>

<div class="container">
    <h2>Enthusia 5.0 Registration Form</h2>

    <form>
        <label>Full Name</label>
        <input type="text" placeholder="Enter your name" required>

        <label>Roll Number</label>
        <input type="text" placeholder="Enter roll number" required>

        <label>Email</label>
        <input type="email" placeholder="Enter email" required>

        <label>Phone Number</label>
        <input type="tel" placeholder="Enter phone number" required>

        <label>Department</label>
        <select required>
            <option value="">Select Department</option>
            <option>B.tech CSE</option>
            <option>Law</option>
            <option>Management studies</option>
            <option>Designing</option>
            <option>BBA</option>
        </select>

        <label>Event Name</label>
        <select required>
            <option value="">Select Event</option>
            <option>Technical Quiz</option>
            <option>Coding Contest</option>
            <option>Paper Presentation</option>
            <option>Cultural Event</option>
        </select>
        
         <label>Subevent Selection Name</label>
        <select required>
            <option value="">Select Event</option>
            <option>Dance</option>
            <option>Drama</option>
            <option>Singing</option>
            <option>Ramp Walk</option>
        </select>
        

        <label>Comments</label>
        <textarea rows="4" placeholder="Any additional details"></textarea>

        <button type="submit">Register</button>
    </form>
</div>

</body>
</html>
