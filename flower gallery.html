<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flower Gallery</title>
    
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: #f0f0f0;
            color: #333;
        }

        .header {
            background: #ff90b3;
            padding: 20px 30px;
            text-align: center;
            color: white;
        }

        .header h1 {
            margin: 0;
            font-size: 2.5em;
        }

        .search-bar {
            margin: 30px auto;
            text-align: center;
        }

        .search-bar input {
            padding: 10px;
            width: 80%;
            max-width: 400px;
            font-size: 18px;
            border: 2px solid #ff90b3;
            border-radius: 8px;
            outline: none;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .gallery-item {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .gallery-item:hover {
            transform: scale(1.05);
        }

        .gallery-item img {
            width: 100%;
            height: auto;
            border-bottom: 2px solid #ff90b3;
        }

        .gallery-item h3 {
            margin: 10px;
            color: #ff90b3;
            font-size: 1.2em;
        }

    </style>
</head>
<body>

<div class="header">
    <h1>Flower Gallery</h1>
    <p>Search for your favorite flowers!</p>
</div>

<div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search for a flower..." onkeyup="filterGallery()">
</div>

<div class="gallery" id="gallery">
    <div class="gallery-item" data-name="Rose">
        <img src="https://cdn.pixabay.com/photo/2025/02/16/20/13/rose-9411615_1280.jpg" alt="Rose">
        <h3>Rose</h3>
    </div>
    <div class="gallery-item" data-name="Tulip">
        <img src="https://tse4.mm.bing.net/th/id/OIP.O0OOSJvzn6ujMUVYA4ApSgHaFj?pid=Api&P=0&h=180" alt="Tulip">
        <h3>Tulip</h3>
    </div>
    <div class="gallery-item" data-name="Sunflower">
        <img src="https://tse2.mm.bing.net/th/id/OIP.seaz9MbcrzbwPGd7c88AVwHaE7?pid=Api&P=0&h=180" alt="Sunflower">
        <h3>Sunflower</h3>
    </div>
    <div class="gallery-item" data-name="Lily">
        <img src="https://i.pinimg.com/originals/84/5d/f9/845df97461d122b7ceab4579541b7e12.jpg" alt="Lily">
        <h3>Lily</h3>
    </div>
    <div class="gallery-item" data-name="Daisy">
        <img src="https://i.pinimg.com/736x/39/da/a6/39daa6e9a23d95e8fcd89ac5d84fc67a.jpg" alt="Daisy">
        <h3>Daisy</h3>
    </div>
    <div class="gallery-item" data-name="Hibiscus">
        <img src="https://tse1.mm.bing.net/th/id/OIP.tc_oT9zbcvxqhvMfLIJTjAHaD4?pid=Api&P=0&h=180" alt="Hibiscus">
        <h3>Hibiscus</h3>
    </div>
    <!-- Add more flowers here -->
</div>

<script>
    function filterGallery() {
        let input = document.getElementById("searchInput");
        let filter = input.value.toUpperCase();
        let gallery = document.getElementById("gallery");
        let items = gallery.getElementsByClassName("gallery-item");

        for (let i = 0; i < items.length; i++) {
            let itemName = items[i].getAttribute("data-name");
            if (itemName.toUpperCase().indexOf(filter) > -1) {
                items[i].style.display = "";
            } else {
                items[i].style.display = "none";
            }
        }
    }
</script>

</body>
</html>
